apiVersion: apps/v1
kind: Deployment
metadata:
  name: stable-deployment
spec:
  replicas: 4
  selector:
    matchLabels:
      app: customer-app
      track: stable
  template:
    metadata:
      labels:
        app: customer-app
        track: stable
    spec:
      containers:
      - name: stable
        image: erwinjelly/ckad:stable
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        resources:
          limits:
            memory: "50Mi"
            cpu: "50m"