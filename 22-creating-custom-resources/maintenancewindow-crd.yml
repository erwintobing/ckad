apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: maintenancewindows.ops.example.com
spec:
  group: ops.example.com
  scope: Cluster
  names:
    plural: maintenancewindows
    singular: maintenancewindow
    kind: MaintenanceWindow
    shortNames:
    - mw
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          description: "Schedule downtime or maintenance period for a service."
          properties:
            spec:
              type: object
              properties:
                serviceName:
                  type: string
                  description: "The name of the service experience downtime."
                startTime:
                  type: string
                  format: date-time
                  description: "The start of the maintenance window , in RFC3339 date-time format (2026-06-03T17:30:00Z)."
                endTime:
                  type: string
                  format: date-time
                  description: "The end of the maintenance window , in RFC3339 date-time format (2026-06-03T17:30:00Z)."
                reason:
                  type: string
                  description: "The reason or purpose of the scheduled maintenance."
              required:
                - serviceName
                - startTime
                - endTime